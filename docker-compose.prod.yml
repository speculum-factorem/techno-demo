# Прод-сервер (только 80 наружу): из каталога techno-demo
# Compose V2 (типично на Ubuntu с docker.io / Docker Engine): docker compose …
# docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Старый бинарь v1: docker-compose … (если установлен отдельно)
services:
  # Public entrypoint
  frontend:
    ports:
      - "80:80"

  # Keep gateway internal; frontend proxies /api -> api-gateway
  api-gateway:
    ports: []

  # Internal services should not be published to internet
  auth-service:
    ports: []
  field-service:
    ports: []
  weather-service:
    ports: []
  analytics-service:
    ports: []
  irrigation-service:
    ports: []
  notification-service:
    ports: []

  postgres:
    ports: []
  kafka:
    ports: []

  # Monitoring/UI are optional in production.
  # If needed, temporarily open and protect them by firewall/VPN.
  prometheus:
    ports: []
  grafana:
    ports: []
  kafka-ui:
    ports: []

