server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://postgres:5432/authdb
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
jwt:
  secret: ${JWT_SECRET:agroanalytics-secret-key-for-jwt-token-signing-2024}
  expiration: 86400000
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  auth:
    verification-ttl-minutes: ${VERIFICATION_TTL_MINUTES:1440}
    register-rate-limit:
      requests: ${REGISTER_RATE_LIMIT_REQUESTS:5}
      window-seconds: ${REGISTER_RATE_LIMIT_WINDOW_SECONDS:900}
