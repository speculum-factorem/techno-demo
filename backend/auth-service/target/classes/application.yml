server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://postgres:5432/authdb
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  bootstrap:
    default-users: true
  auth:
    verification-ttl-minutes: ${VERIFICATION_TTL_MINUTES:1440}
    register-rate-limit:
      requests: ${REGISTER_RATE_LIMIT_REQUESTS:5}
      window-seconds: ${REGISTER_RATE_LIMIT_WINDOW_SECONDS:900}
---
spring:
  config:
    activate:
      on-profile: prod,docker
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  bootstrap:
    default-users: false
