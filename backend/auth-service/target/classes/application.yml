server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://postgres:5432/authdb
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  bootstrap:
    default-users: true
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:admin}
    agronomist-password: ${BOOTSTRAP_AGRONOMIST_PASSWORD:agronomist}
    invite-code: ${BOOTSTRAP_INVITE_CODE:ORG1-INVITE-2026}
  auth:
    verification-ttl-minutes: ${VERIFICATION_TTL_MINUTES:1440}
    login-code-ttl-minutes: ${LOGIN_CODE_TTL_MINUTES:10}
    login-code-max-attempts: ${LOGIN_CODE_MAX_ATTEMPTS:5}
    email-code-max-attempts: ${EMAIL_CODE_MAX_ATTEMPTS:5}
    login-code-resend-cooldown-seconds: ${LOGIN_CODE_RESEND_COOLDOWN_SECONDS:30}
    email-code-resend-cooldown-seconds: ${EMAIL_CODE_RESEND_COOLDOWN_SECONDS:30}
    login-code-resend-rate-limit:
      requests: ${LOGIN_CODE_RESEND_RATE_LIMIT_REQUESTS:5}
      window-seconds: ${LOGIN_CODE_RESEND_RATE_LIMIT_WINDOW_SECONDS:600}
    email-code-resend-rate-limit:
      requests: ${EMAIL_CODE_RESEND_RATE_LIMIT_REQUESTS:5}
      window-seconds: ${EMAIL_CODE_RESEND_RATE_LIMIT_WINDOW_SECONDS:600}
    register-rate-limit:
      requests: ${REGISTER_RATE_LIMIT_REQUESTS:5}
      window-seconds: ${REGISTER_RATE_LIMIT_WINDOW_SECONDS:900}
    # true — invite одноразовый; false (по умолчанию) — один код для многих регистраций (демо)
    invite-single-use: ${INVITE_SINGLE_USE:false}
---
spring:
  config:
    activate:
      on-profile: prod,docker
app:
  bootstrap:
    default-users: true
