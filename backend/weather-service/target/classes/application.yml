server:
  port: 8083

spring:
  application:
    name: weather-service
  datasource:
    url: jdbc:postgresql://postgres:5432/weatherdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: weather-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

open-meteo:
  base-url: https://api.open-meteo.com
  archive-base-url: https://archive-api.open-meteo.com

agro:
  weather:
    # Used only when a field UUID has no coordinates registered (should be rare after sync).
    default-latitude: 47.2357
    default-longitude: 39.7015
  field-service:
    base-url: http://localhost:8082
    sync-on-startup: true
  # Sent as X-Internal-Token to field-service (must match field-service INTERNAL_API_TOKEN)
  internal-api-token: ${INTERNAL_API_TOKEN:}
