server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: field-service
          uri: http://field-service:8082
          predicates:
            - Path=/api/fields/**

        - id: weather-service
          uri: http://weather-service:8083
          predicates:
            - Path=/api/weather/**

        - id: analytics-service
          uri: http://analytics-service:8000
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=2

        - id: irrigation-service
          uri: http://irrigation-service:8084
          predicates:
            - Path=/api/irrigation/**

        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/alerts/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
            allowedOriginPatterns:
              - "http://*"
              - "https://*"
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "X-Requested-With"
              - "Accept"
              - "Origin"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    enabled: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.agroanalytics.gateway: DEBUG
