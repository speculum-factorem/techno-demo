# Профиль docker: полный блок CORS (не только patterns), иначе при merge теряются methods/credentials → 403
spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
            allowedOriginPatterns:
              - "http://*"
              - "https://*"
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "X-Requested-With"
              - "Accept"
              - "Origin"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowCredentials: true
            maxAge: 3600
