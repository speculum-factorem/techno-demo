server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: field-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/fields/**

        - id: weather-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/weather/**

        - id: analytics-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=2

        - id: irrigation-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/irrigation/**

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/alerts/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:8080"
            allowedHeaders:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    enabled: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:agroanalytics-secret-key-for-jwt-token-signing-2024}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.agroanalytics.gateway: DEBUG
