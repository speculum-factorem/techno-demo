global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          service: 'api-gateway'

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
        labels:
          service: 'auth-service'

  - job_name: 'field-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['field-service:8082']
        labels:
          service: 'field-service'

  - job_name: 'weather-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['weather-service:8083']
        labels:
          service: 'weather-service'

  - job_name: 'irrigation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['irrigation-service:8084']
        labels:
          service: 'irrigation-service'

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8085']
        labels:
          service: 'notification-service'
